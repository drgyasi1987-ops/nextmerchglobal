<style>
  :root{
    --purple:#6A2B8D; --purple-light:#9451BE; --purple-dark:#3D1653; --plum:#2B1136;
    --gold:#C9963E; --gold-light:#E4C177;
    --teal:#1F9C82; --coral:#E2703F;
    --paper:#FFFFFF; --paper-2:#F6F5F8;
    --ink:#1D1526; --ink-soft:#655A72; --line:rgba(29,21,38,0.10);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{ font-family:'Inter', sans-serif; background:var(--paper); color:var(--ink); line-height:1.55; overflow-x:hidden; }
  h1,h2,h3,.display{ font-family:'Sora', sans-serif; }
  .mono{ font-family:'JetBrains Mono', monospace; }
  a{ color:inherit; text-decoration:none; }
  ul{ list-style:none; }
  .wrap{ max-width:1220px; margin:0 auto; padding:0 32px; }

  header{
    position:relative; z-index:200;
    background:

      linear-gradient(180deg, #9B57C4 0%, var(--purple) 45%, var(--purple-dark) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.45),
      inset 0 -22px 40px rgba(20,4,30,0.30),
      0 6px 24px rgba(30,8,45,0.35);
    overflow:hidden;
  }
  header::before{
    content:''; position:absolute; top:0; left:-160%; width:55%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.30), transparent);
    animation:shimmer 7s ease-in-out infinite; pointer-events:none;
  }
  @keyframes shimmer{ 0%{left:-160%;} 45%{left:160%;} 100%{left:160%;} }
  .header-inner{ position:relative; display:flex; align-items:center; justify-content:space-between; padding:16px 32px; max-width:1220px; margin:0 auto; }

  .logo-mark{ width:34px; height:34px; flex-shrink:0; }
  .logo-text{ display:flex; flex-direction:column; line-height:1; }
  .logo-text .name{ font-family:'Sora', sans-serif; font-weight:700; font-size:19px; color:#fff; letter-spacing:-0.01em; }
  .logo-text .tag{ font-family:'JetBrains Mono', monospace; font-weight:500; font-size:9.5px; color:var(--gold-light); letter-spacing:0.22em; margin-top:2px; }

  .auth-toggle.mode-signup .slider{ transform:translateX(100%); }

  .auth-toggle.mode-signin button.btn-signin, .auth-toggle.mode-signup button.btn-signup{ color:var(--purple-dark); }
